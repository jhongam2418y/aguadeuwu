name: Build and Release Windows App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. Flutter ──────────────────────────────────────────────────────────
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'   # ✅ Dart 3.10.x — compatible con sqlite3_flutter_libs 0.6.0+eol
          channel: stable
          cache: true

      - name: Flutter Doctor
        run: flutter doctor -v

      # ── 2. Dependencias ─────────────────────────────────────────────────────
      - name: Install dependencies
        run: flutter pub get

      # ── 3. Tests ────────────────────────────────────────────────────────────
      - name: Run tests
        run: flutter test
        continue-on-error: true

      # ── 4. Parchear pubspec.yaml con la versión del tag ─────────────────────
      #   CRÍTICO: PackageInfo.fromPlatform() lee la versión compilada desde
      #   pubspec.yaml. Si no se actualiza, UpdateService siempre ve "1.0.0"
      #   y el autoupdate nunca detecta nuevas versiones.
      - name: Patch version in pubspec.yaml
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)') {
            Write-Error "Tag inválido: '$tag'. Formato esperado: v1.2.3"
            exit 1
          }
          $version = $Matches[1]
          Write-Host "Versión extraída del tag: $version"

          $pubspec = Get-Content "pubspec.yaml" -Raw
          $patched = $pubspec -replace '(?m)^version:.*$', "version: $version+1"
          Set-Content "pubspec.yaml" $patched -NoNewline

          Write-Host "pubspec.yaml actualizado:"
          Select-String "^version:" pubspec.yaml

      # ── 5. Build Windows release ────────────────────────────────────────────
      - name: Build Windows
        run: flutter build windows --release

      # ── 6. Inno Setup ───────────────────────────────────────────────────────
      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Patch version in installer.iss
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""

          if (-not (Test-Path "installer.iss")) {
            Write-Error "installer.iss no encontrado en la raíz del repositorio"
            exit 1
          }

          $content = Get-Content "installer.iss" -Raw
          $patched = $content -replace '(?m)^(AppVersion\s*=).*$', "`${1}$version"
          Set-Content "installer.iss" $patched -NoNewline
          Write-Host "installer.iss actualizado con AppVersion=$version"

      - name: Build Installer with Inno Setup
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            Write-Error "ISCC.exe no encontrado"
            exit 1
          }
          & $iscc installer.iss
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Inno Setup falló con código $LASTEXITCODE"
            exit $LASTEXITCODE
          }

      # ── 7. Verificar artefacto ──────────────────────────────────────────────
      - name: Verify installer output
        shell: pwsh
        run: |
          $output = "output\PiscigranjaInstaller.exe"
          if (-not (Test-Path $output)) {
            Write-Error "Instalador no encontrado en: $output"
            Write-Host "Contenido de output\:"
            Get-ChildItem output -ErrorAction SilentlyContinue
            exit 1
          }
          $sizeMB = [math]::Round((Get-Item $output).Length / 1MB, 2)
          Write-Host "Instalador generado: $output ($sizeMB MB)"

      # ── 8. Release notes ────────────────────────────────────────────────────
      - name: Generate release notes file
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace "^v", ""
          $date    = Get-Date -Format "yyyy-MM-dd"

          @"
          ## Piscigranja v$version

          Publicado: $date

          ### Instalación
          1. Descarga ``PiscigranjaInstaller.exe``
          2. Ejecuta el instalador como administrador
          3. Sigue el asistente de instalación

          ### Notas
          - Requiere Windows 10 o superior
          - Los datos existentes se conservan al actualizar
          "@ | Set-Content "release_notes.md" -Encoding UTF8

      # ── 9. Crear GitHub Release ─────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/PiscigranjaInstaller.exe
          body_path: release_notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}